<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Throw — JavaScript from Zero</title>
<style>
  /* ---------- Design tokens ---------- */
  :root {
    --gym-wall: #16233a;
    --gym-wall-deep: #0d1626;
    --chalk: #f2ead8;
    --scoreboard-amber: #ffb43a;
    --panel: #0a121f;
    --line: #223350;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, var(--gym-wall) 0%, var(--gym-wall-deep) 100%);
    color: var(--chalk);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  header {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    padding: 4px 6px 10px;
  }

  h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  h1 span { color: var(--scoreboard-amber); }

  .hint { font-size: 0.8rem; opacity: 0.65; }

  /* ---------- Player controls ---------- */
  .players {
    width: 100%;
    max-width: 920px;
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .players select,
  .players input {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--chalk);
    font: inherit;
    font-size: 0.85rem;
    padding: 8px 10px;
    border-radius: 6px;
  }

  .players select { flex: 1; }
  .players input { flex: 1; min-width: 0; }
  .players input::placeholder { color: rgba(242, 234, 216, 0.35); }

  /* ---------- LED scoreboard ---------- */
  .scoreboard {
    width: 100%;
    max-width: 920px;
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .panel {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }

  .panel .label {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .panel .value {
    font-family: "Consolas", "SF Mono", monospace;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--scoreboard-amber);
    text-shadow: 0 0 12px rgba(255, 180, 58, 0.45);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Session status strip ---------- */
  .status {
    width: 100%;
    max-width: 920px;
    min-height: 1.3rem;
    margin-bottom: 8px;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    color: var(--scoreboard-amber);
    text-align: center;
  }

  /* ---------- Court canvas ---------- */
  canvas {
    width: 100%;
    max-width: 920px;
    border-radius: 10px;
    display: block;
    touch-action: none;          /* the canvas owns all touch gestures */
    cursor: crosshair;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
  }

  footer {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 6px;
  }

  button {
    background: transparent;
    border: 1px solid #33507d;
    color: var(--chalk);
    font: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover { border-color: var(--scoreboard-amber); color: var(--scoreboard-amber); }
  button:focus-visible,
  .players select:focus-visible,
  .players input:focus-visible { outline: 2px solid var(--scoreboard-amber); outline-offset: 2px; }

  .credit { font-size: 0.7rem; opacity: 0.4; letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <h1>Free Throw <span>· JavaScript from Zero</span></h1>
  <p class="hint">Hold anywhere to charge, aim, release to shoot</p>
</header>

<div class="players">
  <select id="playerSelect" aria-label="Choose player"></select>
  <input id="playerNameInput" type="text" maxlength="18" placeholder="New player name" aria-label="New player name">
  <button id="addPlayerButton" type="button">Add</button>
</div>

<div class="scoreboard" aria-live="polite">
  <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="panel"><div class="label">Shots left</div><div class="value" id="shotsLeft">10</div></div>
  <div class="panel"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
  <div class="panel"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>

<p class="status" id="sessionStatus" aria-live="polite"></p>

<canvas id="court" width="920" height="540" aria-label="Basketball court. Hold anywhere to charge power, aim with the pointer, release to shoot."></canvas>

<footer>
  <button id="newSessionButton" type="button">New session</button>
  <p class="credit">Answer key · Chapter 14 of 14</p>
</footer>

<script>
"use strict";

/* =====================================================================
 * CONFIG — the single source of truth for every number in the game.
 * Frozen so nothing can mutate it by accident (KISS: constants live
 * in one place, with names instead of magic numbers).
 * ===================================================================== */
const CONFIG = Object.freeze({
  world:   { width: 920, height: 540, floorY: 500 },
  physics: {
    gravity: 1800,          // px/s² — pulls the ball down every frame
    floorRestitution: 0.55, // energy kept after a floor bounce (0..1)
    rimRestitution: 0.65,   // energy kept after hitting the rim
    boardRestitution: 0.6,  // energy kept after hitting the backboard
    wallRestitution: 0.6,   // energy kept after hitting a wall or ceiling
    floorFriction: 0.98,    // horizontal slowdown while rolling
    restSpeed: 25,          // below this speed the ball is "at rest"
    minLaunchSpeed: 450,    // an instant tap still throws this hard
    maxLaunchSpeed: 1500    // a fully charged shot throws this hard
  },
  ball:  { startX: 180, startY: 458, radius: 17 },
  hoop:  {
    boardX: 812, boardTop: 168, boardBottom: 318,
    rimY: 300, rimFrontX: 726, rimBackX: 800,
    rimThickness: 5, netDepth: 52
  },
  input: {
    chargeTime: 1.2,     // seconds of holding to reach full power
    previewSteps: 40,
    previewDt: 1 / 45
  },
  powerBar: { x: 26, top: 160, bottom: 460, width: 14 },
  session:  { shotLimit: 10 }
});

/* =====================================================================
 * Ball — owns the ball's state and its motion (Single Responsibility:
 * it integrates physics; it never draws and never reads input).
 * ===================================================================== */
class Ball {
  constructor() {
    this.radius = CONFIG.ball.radius;
    this.reset();
  }

  /** Put the ball back on the free-throw spot, motionless. */
  reset() {
    this.x = CONFIG.ball.startX;
    this.y = CONFIG.ball.startY;
    this.vx = 0;
    this.vy = 0;
  }

  /**
   * Launch the ball with an initial velocity.
   * @param {number} vx horizontal speed in px/s
   * @param {number} vy vertical speed in px/s (negative = upward)
   */
  launch(vx, vy) {
    this.vx = vx;
    this.vy = vy;
  }

  /**
   * Advance the ball one time step using projectile motion.
   * @param {number} dt seconds elapsed since the last frame
   */
  integrate(dt) {
    this.vy += CONFIG.physics.gravity * dt; // gravity accelerates vy
    this.x += this.vx * dt;                 // position follows velocity
    this.y += this.vy * dt;
  }

  /** @returns {number} current speed in px/s */
  speed() {
    return Math.hypot(this.vx, this.vy);
  }
}

/* =====================================================================
 * Hoop — knows its own geometry and resolves collisions against a ball.
 * It also detects a made basket (Open/Closed: swap the hoop for a new
 * obstacle class and the rest of the game does not change).
 * ===================================================================== */
class Hoop {
  constructor() {
    const h = CONFIG.hoop;
    this.rimY = h.rimY;
    this.frontX = h.rimFrontX;
    this.backX = h.rimBackX;
    this.boardX = h.boardX;
    this.boardTop = h.boardTop;
    this.boardBottom = h.boardBottom;
  }

  /**
   * Bounce the ball off the two rim points and the backboard.
   * @param {Ball} ball the ball to test and correct
   */
  collide(ball) {
    this.#collideRimPoint(ball, this.frontX, this.rimY);
    this.#collideRimPoint(ball, this.backX, this.rimY);
    this.#collideBoard(ball);
  }

  /**
   * Treat one rim edge as a small solid circle and reflect the ball
   * off it — the classic circle-vs-circle collision.
   * @param {Ball} ball
   * @param {number} px rim point x
   * @param {number} py rim point y
   */
  #collideRimPoint(ball, px, py) {
    const dx = ball.x - px;
    const dy = ball.y - py;
    const dist = Math.hypot(dx, dy);
    const minDist = ball.radius + CONFIG.hoop.rimThickness;
    if (dist === 0 || dist >= minDist) return;

    // Normal = direction from rim point to ball center
    const nx = dx / dist;
    const ny = dy / dist;

    // Push the ball out so it no longer overlaps the rim
    ball.x = px + nx * minDist;
    ball.y = py + ny * minDist;

    // Reflect only if the ball is moving INTO the rim
    const approaching = ball.vx * nx + ball.vy * ny;
    if (approaching < 0) {
      const r = CONFIG.physics.rimRestitution;
      ball.vx -= (1 + r) * approaching * nx;
      ball.vy -= (1 + r) * approaching * ny;
    }
  }

  /**
   * The backboard is a vertical wall: if the ball crosses it while
   * moving right, mirror its horizontal velocity.
   * @param {Ball} ball
   */
  #collideBoard(ball) {
    const withinHeight = ball.y > this.boardTop && ball.y < this.boardBottom;
    const crossing = ball.x + ball.radius > this.boardX && ball.vx > 0;
    if (withinHeight && crossing) {
      ball.x = this.boardX - ball.radius;
      ball.vx = -ball.vx * CONFIG.physics.boardRestitution;
    }
  }

  /**
   * A basket counts when the ball's center crosses the rim line
   * downward, inside the opening.
   * @param {Ball} ball
   * @param {number} previousY the ball's y on the previous frame
   * @returns {boolean} true exactly on the frame the shot goes in
   */
  isScore(ball, previousY) {
    const crossedDown = previousY <= this.rimY && ball.y > this.rimY && ball.vy > 0;
    const insideOpening =
      ball.x > this.frontX + ball.radius * 0.4 &&
      ball.x < this.backX - ball.radius * 0.4;
    return crossedDown && insideOpening;
  }
}

/* =====================================================================
 * InputController — turns pointer gestures into a charged shot.
 * Hold-to-charge rule: press anywhere to START charging, keep holding
 * to build power, aim with the pointer's position, release to shoot.
 * Works for mouse AND touch through Pointer Events, and knows nothing
 * about physics or drawing.
 * ===================================================================== */
class InputController {
  /**
   * @param {HTMLCanvasElement} canvas the surface receiving gestures
   * @param {Ball} ball read-only reference: aiming starts from wherever it sits
   * @param {() => boolean} canAim tells us whether aiming is allowed now
   * @param {(vx: number, vy: number) => void} onLaunch fired on release
   */
  constructor(canvas, ball, canAim, onLaunch) {
    this.canvas = canvas;
    this.ball = ball;
    this.canAim = canAim;
    this.onLaunch = onLaunch;
    this.isCharging = false;
    this.chargeStart = 0; // ms timestamp when the hold began
    this.aimX = 0;        // current pointer position, world coordinates
    this.aimY = 0;

    canvas.addEventListener("pointerdown", (e) => this.#start(e));
    canvas.addEventListener("pointermove", (e) => this.#move(e));
    canvas.addEventListener("pointerup", () => this.#release());
    canvas.addEventListener("pointercancel", () => { this.isCharging = false; });
  }

  /**
   * Convert a pointer event from screen pixels to world coordinates,
   * compensating for the canvas being scaled by CSS.
   * @param {PointerEvent} e
   * @returns {{x: number, y: number}}
   */
  #toWorld(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = CONFIG.world.width / rect.width;
    const scaleY = CONFIG.world.height / rect.height;
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  /**
   * A press anywhere on the court begins charging — power builds for
   * as long as the hold lasts.
   * @param {PointerEvent} e
   */
  #start(e) {
    if (!this.canAim()) return;
    const p = this.#toWorld(e);
    this.canvas.setPointerCapture(e.pointerId);
    this.isCharging = true;
    this.chargeStart = performance.now();
    this.aimX = p.x;
    this.aimY = p.y;
  }

  /** @param {PointerEvent} e */
  #move(e) {
    if (!this.isCharging) return;
    const p = this.#toWorld(e);
    this.aimX = p.x;
    this.aimY = p.y;
  }

  /** Finish the hold: fire the charged shot if the aim has a direction. */
  #release() {
    if (!this.isCharging) return;
    const shot = this.launchVelocity();
    this.isCharging = false;
    if (shot !== null) this.onLaunch(shot.vx, shot.vy);
  }

  /**
   * How charged the shot is right now.
   * @returns {number} 0 at the instant of pressing, 1 at full charge
   */
  power() {
    const held = (performance.now() - this.chargeStart) / 1000;
    return Math.min(held / CONFIG.input.chargeTime, 1);
  }

  /**
   * Hold-to-charge rule: DIRECTION comes from where the pointer is
   * relative to the ball; SPEED comes from how long the hold lasted,
   * scaled between the minimum and maximum launch speeds.
   * @returns {{vx: number, vy: number} | null} null when the pointer
   *   sits exactly on the ball (no direction to aim)
   */
  launchVelocity() {
    const dx = this.aimX - this.ball.x;
    const dy = this.aimY - this.ball.y;
    const length = Math.hypot(dx, dy);
    if (length === 0) return null;

    const { minLaunchSpeed, maxLaunchSpeed } = CONFIG.physics;
    const speed = minLaunchSpeed + this.power() * (maxLaunchSpeed - minLaunchSpeed);
    return { vx: (dx / length) * speed, vy: (dy / length) * speed };
  }
}

/* =====================================================================
 * PlayerStore — saves and loads each player's records. It uses the
 * browser's localStorage when available and falls back to in-memory
 * data when storage is blocked, so the game never crashes (Liskov:
 * both modes honor the exact same load/save contract).
 * ===================================================================== */
class PlayerStore {
  static #KEY = "freethrow.players.v2";

  constructor() {
    this.memory = {};                       // fallback when storage is blocked
    this.persistent = this.#storageWorks();
  }

  /** @returns {boolean} true when localStorage accepts writes */
  #storageWorks() {
    try {
      localStorage.setItem("__probe", "1");
      localStorage.removeItem("__probe");
      return true;
    } catch {
      return false;
    }
  }

  /** @returns {Object.<string, {bestStreak:number, bestSession:number}>} */
  loadAll() {
    if (!this.persistent) return this.memory;
    try {
      return JSON.parse(localStorage.getItem(PlayerStore.#KEY)) ?? {};
    } catch {
      return {};
    }
  }

  /**
   * Save one player's records (creating the player if new).
   * @param {string} name
   * @param {{bestStreak:number, bestSession:number}} records
   */
  save(name, records) {
    const all = this.loadAll();
    all[name] = records;
    if (this.persistent) {
      localStorage.setItem(PlayerStore.#KEY, JSON.stringify(all));
    } else {
      this.memory = all;
    }
  }
}

/* =====================================================================
 * PlayerPanel — the player <select>, name <input>, and Add button.
 * The only class that touches those DOM elements; it reports player
 * changes upward through one callback.
 * ===================================================================== */
class PlayerPanel {
  /**
   * @param {string[]} names existing player names
   * @param {(name: string) => void} onSelect fired when the player changes
   */
  constructor(names, onSelect) {
    this.select = document.getElementById("playerSelect");
    this.input = document.getElementById("playerNameInput");
    this.onSelect = onSelect;

    names.forEach((n) => this.#addOption(n));
    this.select.addEventListener("change", () => this.onSelect(this.select.value));
    document.getElementById("addPlayerButton")
      .addEventListener("click", () => this.#addFromInput());
  }

  /** @param {string} name */
  #addOption(name) {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    this.select.appendChild(opt);
  }

  /** Create the player typed in the input box and switch to them. */
  #addFromInput() {
    const name = this.input.value.trim();
    if (name === "" || this.#exists(name)) return;
    this.#addOption(name);
    this.select.value = name;
    this.input.value = "";
    this.onSelect(name);
  }

  /**
   * @param {string} name
   * @returns {boolean} true if a player with this name already exists
   */
  #exists(name) {
    return [...this.select.options].some((o) => o.value === name);
  }
}

/* =====================================================================
 * Renderer — draws the whole scene. It only READS game state, never
 * changes it (Single Responsibility again: pixels in, no side effects).
 * ===================================================================== */
class Renderer {
  /** @param {HTMLCanvasElement} canvas */
  constructor(canvas) {
    this.ctx = canvas.getContext("2d");
  }

  /**
   * Draw one complete frame.
   * @param {Ball} ball
   * @param {Hoop} hoop
   * @param {InputController} input
   * @param {boolean} celebrating true right after a made basket
   */
  draw(ball, hoop, input, celebrating) {
    this.#drawBackground();
    this.#drawCourt();
    this.#drawHoopBack(hoop);
    if (input.isCharging) {
      this.#drawTrajectoryPreview(ball, input);
      this.#drawPowerBar(input.power());
    }
    this.#drawBall(ball);
    this.#drawHoopFront(hoop, celebrating);
  }

  /** Paint the gym-wall gradient behind everything. */
  #drawBackground() {
    const { width, height } = CONFIG.world;
    const g = this.ctx.createLinearGradient(0, 0, 0, height);
    g.addColorStop(0, "#1b2c47");
    g.addColorStop(1, "#101c30");
    this.ctx.fillStyle = g;
    this.ctx.fillRect(0, 0, width, height);
  }

  /** Hardwood floor, plank seams, and the free-throw marker. */
  #drawCourt() {
    const { width, height, floorY } = CONFIG.world;
    const ctx = this.ctx;

    // Hardwood floor
    const wood = ctx.createLinearGradient(0, floorY, 0, height);
    wood.addColorStop(0, "#c08145");
    wood.addColorStop(1, "#8f5a2b");
    ctx.fillStyle = wood;
    ctx.fillRect(0, floorY, width, height - floorY);

    // Plank seams
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 1;
    for (let x = 40; x < width; x += 92) {
      ctx.beginPath();
      ctx.moveTo(x, floorY);
      ctx.lineTo(x - 14, height);
      ctx.stroke();
    }

    // Free-throw marker under the ball's starting spot
    ctx.strokeStyle = "rgba(242,234,216,0.5)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(CONFIG.ball.startX - 34, floorY + 1.5);
    ctx.lineTo(CONFIG.ball.startX + 34, floorY + 1.5);
    ctx.stroke();
  }

  /** Backboard, pole and the net (drawn behind the ball). */
  #drawHoopBack(hoop) {
    const ctx = this.ctx;

    // Pole
    ctx.fillStyle = "#2c3e5c";
    ctx.fillRect(hoop.boardX + 8, hoop.boardTop + 30, 12, CONFIG.world.floorY - hoop.boardTop - 30);

    // Backboard glass
    ctx.fillStyle = "rgba(232,238,246,0.88)";
    ctx.fillRect(hoop.boardX, hoop.boardTop, 8, hoop.boardBottom - hoop.boardTop);

    // Net (simple crossing lines from rim down)
    ctx.strokeStyle = "rgba(242,234,216,0.65)";
    ctx.lineWidth = 1.5;
    const bottomY = hoop.rimY + CONFIG.hoop.netDepth;
    const inset = 14;
    for (let i = 0; i <= 4; i++) {
      const topX = hoop.frontX + ((hoop.backX - hoop.frontX) * i) / 4;
      const botX = hoop.frontX + inset + ((hoop.backX - hoop.frontX - inset * 2) * i) / 4;
      ctx.beginPath();
      ctx.moveTo(topX, hoop.rimY);
      ctx.lineTo(botX, bottomY);
      ctx.stroke();
    }
  }

  /** The rim itself, drawn in front so the ball appears to pass through. */
  #drawHoopFront(hoop, celebrating) {
    const ctx = this.ctx;
    ctx.strokeStyle = celebrating ? "#ffd35c" : "#e23d28";
    ctx.lineWidth = CONFIG.hoop.rimThickness * 2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(hoop.frontX, hoop.rimY);
    ctx.lineTo(hoop.backX, hoop.rimY);
    ctx.stroke();
  }

  /** @param {Ball} ball */
  #drawBall(ball) {
    const ctx = this.ctx;

    // Soft shadow on the floor, fading with height
    const height = CONFIG.world.floorY - ball.y;
    const shrink = Math.max(0.35, 1 - height / 700);
    ctx.fillStyle = `rgba(0,0,0,${0.28 * shrink})`;
    ctx.beginPath();
    ctx.ellipse(ball.x, CONFIG.world.floorY + 6, ball.radius * shrink * 1.2, 5 * shrink, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const g = ctx.createRadialGradient(ball.x - 5, ball.y - 6, 3, ball.x, ball.y, ball.radius);
    g.addColorStop(0, "#f5824e");
    g.addColorStop(1, "#cf4d1c");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();

    // Seams
    ctx.strokeStyle = "rgba(90,30,8,0.8)";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.moveTo(ball.x - ball.radius, ball.y);
    ctx.lineTo(ball.x + ball.radius, ball.y);
    ctx.moveTo(ball.x, ball.y - ball.radius);
    ctx.quadraticCurveTo(ball.x + ball.radius * 0.7, ball.y, ball.x, ball.y + ball.radius);
    ctx.stroke();
  }

  /**
   * Simulate the first moments of the flight and draw them as dots —
   * the physics becomes visible BEFORE the shot, and the arc grows
   * live as the charge builds.
   * @param {Ball} ball the preview starts from its current position
   * @param {InputController} input
   */
  #drawTrajectoryPreview(ball, input) {
    const shot = input.launchVelocity();
    if (shot === null) return;
    const { previewSteps, previewDt } = CONFIG.input;
    let x = ball.x;
    let y = ball.y;
    let simVx = shot.vx;
    let simVy = shot.vy;

    this.ctx.fillStyle = "rgba(255,212,92,0.85)";
    for (let i = 0; i < previewSteps; i++) {
      simVy += CONFIG.physics.gravity * previewDt;
      x += simVx * previewDt;
      y += simVy * previewDt;
      if (y > CONFIG.world.floorY) break;
      if (i % 3 === 0) {
        this.ctx.beginPath();
        this.ctx.arc(x, y, 3.2, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }
  }

  /**
   * Vertical charge gauge: fills bottom-up while the hold lasts and
   * shifts from green to red as power approaches maximum.
   * @param {number} power 0..1 charge fraction
   */
  #drawPowerBar(power) {
    const { x, top, bottom, width } = CONFIG.powerBar;
    const ctx = this.ctx;
    const barHeight = bottom - top;

    // Empty gauge outline
    ctx.strokeStyle = "rgba(242,234,216,0.5)";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, top, width, barHeight);

    // Fill from the bottom, green → amber → red as power grows
    const hue = 120 - power * 120; // 120=green, 0=red
    ctx.fillStyle = `hsl(${hue}, 85%, 55%)`;
    const fill = barHeight * power;
    ctx.fillRect(x, bottom - fill, width, fill);
  }
}

/* =====================================================================
 * Scoreboard — the only class allowed to touch the DOM counters and
 * the session status line (Dependency Inversion: Game talks to this
 * small interface, not to document.getElementById scattered around).
 * ===================================================================== */
class Scoreboard {
  constructor() {
    this.scoreEl = document.getElementById("score");
    this.shotsLeftEl = document.getElementById("shotsLeft");
    this.streakEl = document.getElementById("streak");
    this.bestEl = document.getElementById("best");
    this.statusEl = document.getElementById("sessionStatus");
  }

  /**
   * Refresh the four LED panels.
   * @param {{score:number, shotsLeft:number, streak:number}} session
   * @param {{bestStreak:number, bestSession:number}} records
   */
  update(session, records) {
    this.scoreEl.textContent = String(session.score);
    this.shotsLeftEl.textContent = String(session.shotsLeft);
    this.streakEl.textContent = String(session.streak);
    this.bestEl.textContent = String(records.bestStreak);
  }

  /**
   * Show (or clear) the session status line under the scoreboard.
   * @param {string} text empty string hides the message
   */
  status(text) {
    this.statusEl.textContent = text;
  }
}

/* =====================================================================
 * Game — the composition root. It wires every part together, runs the
 * loop, and owns the session rules
 * (states: "ready" → "flight" → … → "sessionOver" → "ready").
 * ===================================================================== */
class Game {
  /** @param {HTMLCanvasElement} canvas */
  constructor(canvas) {
    this.ball = new Ball();
    this.hoop = new Hoop();
    this.renderer = new Renderer(canvas);
    this.scoreboard = new Scoreboard();
    this.store = new PlayerStore();
    this.input = new InputController(
      canvas,
      this.ball,
      () => this.state === "ready",
      (vx, vy) => this.#shoot(vx, vy)
    );

    this.state = "ready";     // "ready" | "flight" | "sessionOver"
    this.scoredThisShot = false;
    this.celebrateUntil = 0;  // timestamp: rim glows until this moment
    this.lastTime = 0;

    // Load saved players; guarantee at least one profile exists
    const saved = this.store.loadAll();
    const names = Object.keys(saved);
    if (names.length === 0) names.push("Player 1");
    this.playerPanel = new PlayerPanel(names, (name) => this.#switchPlayer(name));
    this.#switchPlayer(names[0]);

    document.getElementById("newSessionButton")
      .addEventListener("click", () => this.#newSession());

    requestAnimationFrame((t) => this.#frame(t));
  }

  /**
   * Load (or create) the named player's records, make them active,
   * and start them a fresh session.
   * @param {string} name
   */
  #switchPlayer(name) {
    this.playerName = name;
    const saved = this.store.loadAll();
    this.records = saved[name] ?? { bestStreak: 0, bestSession: 0 };
    this.store.save(name, this.records);
    this.#newSession();
  }

  /** Fresh session: full shot count, zeroed score, ball on the line. */
  #newSession() {
    this.session = { score: 0, shotsLeft: CONFIG.session.shotLimit, streak: 0 };
    this.ball.reset();
    this.state = "ready";
    this.scoreboard.status("");
    this.scoreboard.update(this.session, this.records);
  }

  /** Persist the active player's records and refresh the panels. */
  #commit() {
    this.store.save(this.playerName, this.records);
    this.scoreboard.update(this.session, this.records);
  }

  /**
   * @param {number} vx
   * @param {number} vy
   */
  #shoot(vx, vy) {
    this.ball.launch(vx, vy);
    this.state = "flight";
    this.scoredThisShot = false;
    this.session.shotsLeft -= 1;
    this.#commit();
  }

  /**
   * One animation frame: compute dt, update the world, draw it.
   * @param {number} timestamp milliseconds from requestAnimationFrame
   */
  #frame(timestamp) {
    const dt = Math.min((timestamp - this.lastTime) / 1000, 1 / 30); // clamp big gaps
    this.lastTime = timestamp;

    if (this.state === "flight") this.#updateFlight(dt, timestamp);

    const celebrating = timestamp < this.celebrateUntil;
    this.renderer.draw(this.ball, this.hoop, this.input, celebrating);
    requestAnimationFrame((t) => this.#frame(t));
  }

  /**
   * Physics + rules while the ball is in the air.
   * @param {number} dt seconds since last frame
   * @param {number} timestamp current time in ms
   */
  #updateFlight(dt, timestamp) {
    const previousY = this.ball.y;
    this.ball.integrate(dt);
    this.hoop.collide(this.ball);
    this.#collideBounds();

    if (!this.scoredThisShot && this.hoop.isScore(this.ball, previousY)) {
      this.scoredThisShot = true;
      this.session.score += 1;
      this.session.streak += 1;
      this.records.bestStreak = Math.max(this.records.bestStreak, this.session.streak);
      this.celebrateUntil = timestamp + 700;
      this.#commit();
    }

    if (this.#shotIsOver()) {
      if (!this.scoredThisShot) this.session.streak = 0;
      if (this.session.shotsLeft === 0) {
        this.#endSession();
      } else {
        this.state = "ready"; // the ball stays put: next shot starts here
      }
      this.#commit();
    }
  }

  /** Close the session: update records and show the results line. */
  #endSession() {
    this.state = "sessionOver";
    const made = this.session.score;
    const limit = CONFIG.session.shotLimit;
    const isRecord = made > this.records.bestSession;
    this.records.bestSession = Math.max(this.records.bestSession, made);
    this.scoreboard.status(
      `${this.playerName}: ${made} of ${limit} made` +
      (isRecord ? " — new personal best!" : ` · personal best ${this.records.bestSession}`) +
      " Press New session to play again."
    );
  }

  /** Keep the ball inside the gym: floor, both walls, and the ceiling. */
  #collideBounds() {
    const { width, floorY } = CONFIG.world;
    const r = this.ball.radius;
    const wall = CONFIG.physics.wallRestitution;

    // Floor: bounce and roll on the hardwood
    if (this.ball.y + r > floorY) {
      this.ball.y = floorY - r;
      this.ball.vy = -this.ball.vy * CONFIG.physics.floorRestitution;
      this.ball.vx *= CONFIG.physics.floorFriction;
    }

    // Ceiling: mirror the vertical velocity
    if (this.ball.y - r < 0) {
      this.ball.y = r;
      this.ball.vy = -this.ball.vy * wall;
    }

    // Left wall: mirror the horizontal velocity
    if (this.ball.x - r < 0) {
      this.ball.x = r;
      this.ball.vx = -this.ball.vx * wall;
    }

    // Right wall: same rule on the far side
    if (this.ball.x + r > width) {
      this.ball.x = width - r;
      this.ball.vx = -this.ball.vx * wall;
    }
  }

  /** @returns {boolean} true when the ball has settled on the floor */
  #shotIsOver() {
    return (
      this.ball.y + this.ball.radius >= CONFIG.world.floorY - 1 &&
      this.ball.speed() < CONFIG.physics.restSpeed
    );
  }
}

/* ---------- Boot ---------- */
new Game(document.getElementById("court"));
</script>
</body>
</html>
