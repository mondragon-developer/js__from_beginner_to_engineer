<h1>Exercise 3 — a richer tab title</h1>
<p>Look at the browser tab, then open the console (F12).</p>

<script>
"use strict";

const playerName = "Ana";
const gameTitle = "Free Throw";
let shotsLeft = 10;
shotsLeft = shotsLeft - 1;

document.title = playerName + " — " + gameTitle + " — " + shotsLeft + " shots left";
console.log("Tab renamed for", playerName);

// The second part of the exercise asks you to try:
//
//   gameTitle = "Layups";
//
// Uncomment that line and the console shows, in red:
//
//   Uncaught TypeError: Assignment to constant variable.
//
// That is const keeping its promise. Chapter 4 builds on exactly this.
</script>
</body>
</html>
