<body>

<h1>Exercise 1 — a greeting from a variable</h1>
<p>Open the console (F12).</p>

<script>
"use strict";

// const fits: a name does not change while the program runs.
const playerName = "Ana";
console.log("Ready to play, " + playerName);

// The comma form works too, and is what we use while debugging:
console.log("Ready to play,", playerName);
</script>
</body>
