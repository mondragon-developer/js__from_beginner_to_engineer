<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 4 — Exercise 3 (stretch)</title>
<style>
  body { background: #0d1626; margin: 0; display: flex; justify-content: center; padding: 16px; }
  canvas { border-radius: 10px; }
</style>
</head>
<body>

<canvas id="court" width="920" height="540"></canvas>

<script>
"use strict";

const CONFIG = Object.freeze({
  world: { width: 920, height: 540, floorY: 500 },
  ball:  { startX: 180, startY: 458, radius: 17 },
  hoop:  { poleX: 820, poleTop: 200, poleWidth: 12 }
});

// Predictions about Object.freeze on this CONFIG — both verified in the
// console (Chrome 150):
//
// WOULD catch (TypeError, because CONFIG's top level is frozen):
//   CONFIG.hoop = {};        → "Cannot assign to read only property 'hoop'..."
//   CONFIG.debug = true;     → "Cannot add property debug, object is not extensible"
//
// WOULD NOT catch (freeze is shallow — the nested objects are not frozen):
//   CONFIG.hoop.poleX = 500; → succeeds silently; the pole moves.

const canvas = document.getElementById("court");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#16233a";
ctx.fillRect(0, 0, CONFIG.world.width, CONFIG.world.height);

ctx.fillStyle = "#a06a38";
ctx.fillRect(0, CONFIG.world.floorY, CONFIG.world.width, CONFIG.world.height - CONFIG.world.floorY);

ctx.fillStyle = "#2c3e5c";
ctx.fillRect(CONFIG.hoop.poleX, CONFIG.hoop.poleTop,
             CONFIG.hoop.poleWidth, CONFIG.world.floorY - CONFIG.hoop.poleTop);

ctx.fillStyle = "#e0662f";
ctx.beginPath();
ctx.arc(CONFIG.ball.startX, CONFIG.ball.startY, CONFIG.ball.radius, 0, Math.PI * 2);
ctx.fill();
</script>
</body>
</html>
