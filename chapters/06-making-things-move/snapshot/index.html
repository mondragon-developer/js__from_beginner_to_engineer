<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free Throw — Chapter 6</title>
<style>
  body { background: #0d1626; margin: 0; display: flex; justify-content: center; padding: 16px; }
  canvas { border-radius: 10px; }
</style>
</head>
<body>

<canvas id="court" width="920" height="540"></canvas>

<script>
"use strict";

/* =====================================================================
 * CONFIG — the single source of truth for every number in the game.
 * Frozen so nothing can change it by accident (constants live in one
 * place, with names instead of magic numbers).
 * ===================================================================== */
const CONFIG = Object.freeze({
  world:   { width: 920, height: 540, floorY: 500 },
  physics: {
    gravity: 1800,          // px/s² — pulls the ball down every frame
    floorRestitution: 0.55, // energy kept after a floor bounce (0..1)
    floorFriction: 0.98,    // horizontal slowdown while rolling
    restSpeed: 25           // below this speed the ball is "at rest"
  },
  ball:  { startX: 180, startY: 458, radius: 17 },
  hoop:  {
    boardX: 812, boardTop: 168, boardBottom: 318,
    rimY: 300, rimFrontX: 726, rimBackX: 800,
    rimThickness: 5
  }
});

const canvas = document.getElementById("court");
const ctx = canvas.getContext("2d");

/* =====================================================================
 * The ball — position AND velocity now, because it moves. It starts
 * high on purpose: this chapter is about watching it fall.
 * (Chapter 8 puts it back on the free-throw spot, under your control.)
 * ===================================================================== */
const ball = {
  x: CONFIG.ball.startX,
  y: 80,
  vx: 120,  // a gentle sideways drift, so rolling is visible too
  vy: 0,
  radius: CONFIG.ball.radius
};

/**
 * Advance the ball one time step using projectile motion.
 * @param {number} dt seconds elapsed since the last frame
 */
function integrateBall(dt) {
  ball.vy += CONFIG.physics.gravity * dt; // gravity accelerates vy
  ball.x += ball.vx * dt;                 // position follows velocity
  ball.y += ball.vy * dt;
}

/** @returns {number} current speed in px/s */
function ballSpeed() {
  return Math.hypot(ball.vx, ball.vy);
}

/** Bounce on the hardwood, lose energy, and eventually come to rest. */
function collideFloor() {
  if (ball.y + ball.radius <= CONFIG.world.floorY) return; // still airborne

  ball.y = CONFIG.world.floorY - ball.radius;              // snap out of the floor
  ball.vy = -ball.vy * CONFIG.physics.floorRestitution;    // bounce, losing energy
  ball.vx *= CONFIG.physics.floorFriction;                 // rolling slows down

  if (ballSpeed() < CONFIG.physics.restSpeed) {            // slow enough: stop
    ball.vx = 0;
    ball.vy = 0;
  }
}

/** Paint the gym wall and the hardwood floor. */
function drawCourt() {
  ctx.fillStyle = "#16233a";
  ctx.fillRect(0, 0, CONFIG.world.width, CONFIG.world.height);

  ctx.fillStyle = "#a06a38";
  ctx.fillRect(0, CONFIG.world.floorY, CONFIG.world.width, CONFIG.world.height - CONFIG.world.floorY);
}

/**
 * Draw the ball centered at (x, y).
 * @param {number} x horizontal center in pixels
 * @param {number} y vertical center in pixels
 */
function drawBall(x, y) {
  ctx.fillStyle = "#e0662f";
  ctx.beginPath();
  ctx.arc(x, y, CONFIG.ball.radius, 0, Math.PI * 2);
  ctx.fill();
}

/** Draw the pole, the backboard glass, and the rim. */
function drawHoop() {
  const h = CONFIG.hoop;

  // Pole
  ctx.fillStyle = "#2c3e5c";
  ctx.fillRect(h.boardX + 8, h.boardTop + 30, 12, CONFIG.world.floorY - h.boardTop - 30);

  // Backboard glass
  ctx.fillStyle = "rgba(232,238,246,0.88)";
  ctx.fillRect(h.boardX, h.boardTop, 8, h.boardBottom - h.boardTop);

  // Rim: a thick line from the front lip to the backboard
  ctx.strokeStyle = "#e23d28";
  ctx.lineWidth = h.rimThickness * 2;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(h.rimFrontX, h.rimY);
  ctx.lineTo(h.rimBackX, h.rimY);
  ctx.stroke();
}

let lastTime = 0;

/**
 * One animation frame: compute dt, update the world, draw it.
 * @param {number} timestamp milliseconds from requestAnimationFrame
 */
function frame(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 1 / 30); // clamp big gaps
  lastTime = timestamp;

  integrateBall(dt);
  collideFloor();

  drawCourt();
  drawHoop();
  drawBall(ball.x, ball.y);

  requestAnimationFrame(frame); // book the next page of the flipbook
}

/* ---------- Boot ---------- */
requestAnimationFrame(frame);
</script>
</body>
</html>
